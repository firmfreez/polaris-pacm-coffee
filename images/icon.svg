<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Polaris coffee machine icon</title>
  <desc id="desc">Stylized Polaris PACM coffee machine with a glass cup and milk container.</desc>
  <defs>
    <linearGradient id="machine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#202326"/>
      <stop offset="0.55" stop-color="#08090a"/>
      <stop offset="1" stop-color="#3a3d3f"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f7f5"/>
      <stop offset="0.45" stop-color="#9a9d9f"/>
      <stop offset="1" stop-color="#f5f1eb"/>
    </linearGradient>
    <linearGradient id="coffee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f1e0c4"/>
      <stop offset="0.34" stop-color="#d99955"/>
      <stop offset="1" stop-color="#7a421f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="#f4f0e8"/>
  <circle cx="397" cy="106" r="72" fill="#d2b071" opacity="0.28"/>
  <circle cx="91" cy="397" r="94" fill="#7aa8a1" opacity="0.22"/>

